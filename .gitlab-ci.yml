image: python:3.11-slim

stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

tests:
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt
  script:
    - python -m pytest -q
